<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>雅思單字 - 瀏覽</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>📘 雅思單字</h1>
    <nav>
      <a href="index.html" class="active">瀏覽</a>
      <a href="my-words.html">我的</a>
      <a href="quiz.html">測驗</a>
      <a href="help.html" class="nav-help">說明</a>
    </nav>
  </header>

  <main>
    <div id="streakInfo" class="streak-info"></div>

    <section class="filters">
      <input type="text" id="search" placeholder="🔍 搜尋單字 / 中文..." />
      <div class="filter-row">
        <select id="categoryFilter">
          <option value="">全部主題</option>
        </select>
        <select id="levelFilter">
          <option value="">全部難度</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
          <option value="6">6+</option>
          <option value="7">7+</option>
        </select>
        <select id="statusFilter">
          <option value="">全部狀態</option>
          <option value="starred">⭐ 標記</option>
          <option value="mastered">✓ 已掌握</option>
          <option value="unmastered">未掌握</option>
        </select>
      </div>
      <div class="stats">
        <span id="totalCount">共 0 字</span>
        <span id="masteredCount">✓ 已掌握 0</span>
        <span id="starredCount">⭐ 標記 0</span>
      </div>
      <div class="flip-mode-toggle">
        <label>
          <input type="checkbox" id="flipMode"> 翻面模式（中文/例句先模糊，點才翻面）
        </label>
      </div>
    </section>

    <section id="vocabList" class="vocab-list"></section>
  </main>

  <footer>
    <p>累積來源：所有口說、聽力、閱讀練習</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
